<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenges | Chess King</title>
  <meta name="description" content="Challenges - Chess King">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            slate: {
              950: '#030712'
            }
          }
        }
      }
    }
  </script>

  <!-- Global Styles -->
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-image:
        radial-gradient(circle at top right, rgba(99,102,241,0.07), transparent 40%),
        radial-gradient(circle at bottom left, rgba(6,182,212,0.05), transparent 45%);
    }

    .glass-panel {
      background: rgba(15,23,42,0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(51,65,85,0.5);
    }
  </style>

  <!-- Supabase JS Library CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased flex flex-col justify-between p-6">
  <div class="max-w-4xl mx-auto w-full">
    <!-- Navbar / Header -->
    <header class="flex items-center justify-between py-4 border-b border-slate-900 mb-8">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-violet-600 to-indigo-600 flex items-center justify-center font-bold">♔</div>
        <span class="font-extrabold text-lg tracking-tight">Chess King</span>
      </div>
      <nav class="flex items-center gap-4 text-sm font-semibold text-slate-400">
        <a href="lobby.html" class="hover:text-white transition-colors">Lobby</a>
        <a href="challenge.html" class="text-white">Challenges</a>
        <a href="player.html" class="hover:text-white transition-colors">Profile</a>
      </nav>
    </header>

    <!-- Main Content Panel -->
    <main class="glass-panel rounded-3xl p-8 shadow-2xl relative overflow-hidden">
      <h1 class="text-2xl font-bold mb-4">Challenges</h1>
      <p class="text-slate-400 text-sm">Issue and respond to open and direct matchmaking challenges.</p>
    </main>
  </div>
</body>
</html>
