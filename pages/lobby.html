<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby | Chess King</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body { background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent 40%); }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(51, 65, 85, 0.4); }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col antialiased">

  <header class="border-b border-slate-900 bg-slate-950/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <span class="text-xl font-black bg-gradient-to-r from-violet-400 to-indigo-400 bg-clip-text text-transparent">Chess King</span>
    </div>
    <nav class="flex gap-6 text-sm font-medium text-slate-400">
      <a href="/pages/lobby.html" class="text-violet-400">Lobby</a>
      <a href="/pages/challenge.html" class="hover:text-slate-200 transition-colors">Challenges</a>
      <a href="/pages/player.html" class="hover:text-slate-200 transition-colors">Profile</a>
    </nav>
  </header>

  <main class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
    
    <div class="lg:col-span-1 glass-card rounded-2xl p-4 flex flex-col h-[calc(100vh-140px)]">
      <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Online Players
      </h2>
      <div id="players-list" class="flex-1 overflow-y-auto space-y-2 pr-1">
        <p class="text-xs text-slate-500 italic">Scanning lobby...</p>
      </div>
    </div>

    <div class="lg:col-span-2 space-y-6 flex flex-col h-[calc(100vh-140px)]">
      <div class="glass-card rounded-2xl p-6 flex-1 flex flex-col">
        <h2 class="text-lg font-bold text-white mb-4">Live Match Arena</h2>
        <div id="games-list" class="flex-1 overflow-y-auto space-y-3">
          <p class="text-sm text-slate-500 italic">No live matches running at the moment.</p>
        </div>
      </div>
    </div>

    <div class="lg:col-span-1 glass-card rounded-2xl p-4 flex flex-col h-[calc(100vh-140px)]">
      <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3">Global Chat</h2>
      <div id="chat-messages" class="flex-1 overflow-y-auto space-y-3 pr-1 text-xs mb-3">
      </div>
      <form id="chat-form" class="flex gap-2">
        <input type="text" id="chat-input" placeholder="Say hello..." class="flex-1 bg-slate-900/50 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white outline-none focus:border-violet-500 transition-colors" required />
        <button type="submit" class="bg-violet-600 hover:bg-violet-500 text-white font-bold px-3 py-2 rounded-xl text-xs transition-colors">Send</button>
      </form>
    </div>

  </main>

  <script type="text/javascript">
    const SUPABASE_URL = "https://evvilodteymztdgbdhgi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2dmlsb2R0ZXltenRkZ2JkaGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzE3NTUsImV4cCI6MjA5Mjk0Nzc1NX0.2IjuXfxXwhMIkfFmlR8SCi4bEZ_gaR8E0M3XqiXtRm4";
    
    let supabase;
    let currentUser = null;

    window.addEventListener('load', async () => {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = '/index.html';
        return;
      }
      currentUser = session.user;

      initializeLobbyEngine();
    });

    async function initializeLobbyEngine() {
      // FIX 1: Resolve the username metadata string BEFORE running any lists
      let usernameString = currentUser.user_metadata?.username;
      if (!usernameString) {
        const { data: profileData } = await supabase
          .from('profiles')
          .select('username')
          .eq('id', currentUser.id)
          .maybeSingle();
        usernameString = profileData?.username || currentUser.email.split('@')[0];
      }

      // FIX 2: Execute the upsert statement FIRST so the user is officially online
      await supabase.from('players').upsert({
        id: currentUser.id,
        username: usernameString,
        status: 'online',
        last_seen: new Date().toISOString()
      }, { onConflict: 'id' });

      // FIX 3: Fetch players only AFTER your user state has been written to the table
      fetchOnlinePlayers();
      
      // FIX 4: Bind the change listener directly to update our list on any mutation event
      supabase
        .channel('public:players')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, (payload) => {
          console.log("Realtime player change detected:", payload);
          fetchOnlinePlayers();
        })
        .subscribe();
    }

    async function fetchOnlinePlayers() {
      // FIX 5: Targeted 'players' instead of a view structure to match the socket loop channel topic
      const { data, error } = await supabase
        .from('players')
        .select('*');

      if (error) {
        console.error("Error fetching online players:", error);
        return;
      }
      
      const container = document.getElementById('players-list');
      container.innerHTML = '';

      // Count players that are NOT the current user
      const otherPlayers = data.filter(player => player.id !== currentUser.id);

      if (otherPlayers.length === 0) {
        container.innerHTML = '<p class="text-[11px] text-slate-500 italic">No other players online yet...</p>';
        return;
      }

      otherPlayers.forEach(player => {
        const row = document.createElement('div');
        row.className = "flex justify-between items-center p-2 rounded-xl bg-slate-900/40 border border-slate-800/40";
        row.innerHTML = `
          <span class="text-xs font-medium text-slate-300">@${player.username}</span>
          <button onclick="issueDirectChallenge('${player.id}')" class="bg-violet-600/20 hover:bg-violet-600 text-violet-400 hover:text-white text-[10px] font-bold px-2 py-1 rounded-lg transition-all border border-violet-500/20">Challenge</button>
        `;
        container.appendChild(row);
      });
    }

    function issueDirectChallenge(targetId) {
      window.location.href = `/pages/challenge.html?targetPlayer=${targetId}`;
    }
  </script>
</body>
</html>
