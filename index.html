  <script type="text/javascript">
    const SUPABASE_URL = "https://evvilodteymztdgbdhgi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2dmlsb2R0ZXltenRkZ2JkaGdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzE3NTUsImV4cCI6MjA5Mjk0Nzc1NX0.2IjuXfxXwhMIkfFmlR8SCi4bEZ_gaR8E0M3XqiXtRm4";

    window.chessSupabase = null;
    try {
      window.chessSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          // Must match the storageKey in src/lib/supabase.ts
          // so sign-out on inner pages also clears the session index.html checks
          storageKey: 'chess-king-auth',
        }
      });
    } catch (e) {
      console.error("Failed to initialize Supabase client:", e);
    }

    // Immediately hide page during session check
    document.documentElement.classList.add('opacity-0');

    (async function checkSession() {
      if (window.chessSupabase) {
        const { data: { session } } = await window.chessSupabase.auth.getSession();
        if (session) {
          window.location.href = '/pages/lobby.html';
          return;
        }
      }
      document.documentElement.classList.remove('opacity-0');

  <script type="text/javascript" id="auth-form-controller">
    document.addEventListener("DOMContentLoaded", () => {
      const errorBanner = document.getElementById("error-banner");
      const errorMessage = document.getElementById("error-message");
      const successBanner = document.getElementById("success-banner");
      const successMessage = document.getElementById("success-message");

      const signinForm = document.getElementById("signin-form");
      const signupForm = document.getElementById("signup-form");
      
      const formSubtitle = document.getElementById("form-subtitle");
      const togglePromptText = document.getElementById("toggle-prompt-text");
      const toggleModeBtn = document.getElementById("toggle-auth-mode-btn");

      let currentMode = "signin"; // 'signin' or 'signup'

      function showError(msg) {
        errorMessage.textContent = msg;
        errorBanner.classList.remove("hidden");
        successBanner.classList.add("hidden");
      }

      function showSuccess(msg) {
        successMessage.textContent = msg;
        successBanner.classList.remove("hidden");
        errorBanner.classList.add("hidden");
      }

      function clearBanners() {
        errorBanner.classList.add("hidden");
        successBanner.classList.add("hidden");
      }

      // Mode toggler
      toggleModeBtn.addEventListener("click", () => {
        clearBanners();
        if (currentMode === "signin") {
          currentMode = "signup";
          signinForm.classList.add("hidden");
          signupForm.classList.remove("hidden");
          formSubtitle.textContent = "Create your account and start winning.";
          togglePromptText.textContent = "Already have an account?";
          toggleModeBtn.textContent = "Sign In";
        } else {
          currentMode = "signin";
          signupForm.classList.add("hidden");
          signinForm.classList.remove("hidden");
          formSubtitle.textContent = "Welcome back. Ready to play?";
          togglePromptText.textContent = "Don't have an account?";
          toggleModeBtn.textContent = "Register";
        }
      });

      // Submit handlers
      signinForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearBanners();

        const identifier = document.getElementById("si-identifier").value.trim();
        const password = document.getElementById("si-password").value;
        const submitBtn = document.getElementById("signin-submit-btn");

        if (!identifier || !password) return;
        
        submitBtn.disabled = true;
        submitBtn.querySelector("span").textContent = "Signing In...";

        try {
          let emailAddress = identifier;

          // Check if identifier is email or username
          if (!identifier.includes("@")) {
            // Refactored to look up against our specific isolated window scope client reference
            const { data, error } = await window.chessSupabase
              .from("profiles")
              .select("email")
              .eq("username", identifier)
              .maybeSingle();

            if (error || !data || !data.email) {
              throw new Error("No account found matching that username.");
            }
            emailAddress = data.email;
          }

          // Hand credentials payload to signInWithPassword via absolute client context
          const { data: authData, error: authError } = await window.chessSupabase.auth.signInWithPassword({
            email: emailAddress,
            password: password
          });

          if (authError) throw authError;

          showSuccess("Login successful! Redirecting...");
          setTimeout(() => {
            window.location.href = "/pages/lobby.html";
          }, 800);

        } catch (err) {
          showError(err.message || "Sign in failed. Please try again.");
          submitBtn.disabled = false;
          submitBtn.querySelector("span").textContent = "Sign In";
        }
      });

      signupForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearBanners();

        const username = document.getElementById("su-username").value.trim();
        const fullname = document.getElementById("su-fullname").value.trim();
        const email = document.getElementById("su-email").value.trim();
        const password = document.getElementById("su-password").value;
        const confirm = document.getElementById("su-confirm").value;
        const submitBtn = document.getElementById("signup-submit-btn");

        if (password !== confirm) {
          showError("Passwords do not match.");
          return;
        }
        if (password.length < 6) {
          showError("Password must be at least 6 characters.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.querySelector("span").textContent = "Creating Account...";

        try {
          const { data: authData, error: signUpError } = await window.chessSupabase.auth.signUp({
            email: email,
            password: password,
            options: {
              data: { username: username, full_name: fullname }
            }
          });

          if (signUpError) throw signUpError;
          if (!authData.user) throw new Error("Registration failed.");

          // 2. Profiles Table Sync Insertion
          const { error: profileError } = await window.chessSupabase.from("profiles").upsert({
            id: authData.user.id,
            username: username,
            full_name: fullname,
            email: email,
            created_at: new Date().toISOString()
          });

          if (profileError) throw profileError;

          // 3. Players Table Sync Insertion (Explicitly forwarding auth ID to avoid constraint blocks)
          const { error: playerError } = await window.chessSupabase.from("players").upsert({
            id: authData.user.id,
            username: username,
            status: "online",
            last_seen: new Date().toISOString()
          }, { onConflict: "id" });

          if (playerError) throw playerError;

          if (authData.session) {
            showSuccess("Account created successfully! Redirecting...");
            setTimeout(() => {
              window.location.href = "/pages/lobby.html";
            }, 800);
          } else {
            showSuccess("Account created! Please check your email to confirm registration, then sign in.");
            signupForm.reset();
            toggleModeBtn.click();
            submitBtn.disabled = false;
            submitBtn.querySelector("span").textContent = "Create Account";
          }

        } catch (err) {
          showError(err.message || "Registration failed. Please try again.");
          submitBtn.disabled = false;
          submitBtn.querySelector("span").textContent = "Create Account";
        }
      });
    });
  </script>
